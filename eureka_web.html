<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka DFM 3.0 — Universal CAD Validator</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts is loaded, but we'll use SVGs for exact gauge designs matching SW taskpane -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js" crossorigin></script>

    <style>
        /* Base styles including print overrides */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1E2227;
            color: #E8EAF0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            overflow-x: hidden;
        }

        /* Custom Tooltip Help Styling */
        .help-tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            color: #4A80E0;
            margin-left: 4px;
            font-weight: bold;
        }

        .help-tooltip .tooltiptext {
            visibility: hidden;
            width: 200px;
            background-color: #2F3540;
            color: #E8EAF0;
            text-align: left;
            border: 1px solid #3A3F4B;
            border-radius: 4px;
            padding: 8px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 11px;
            font-weight: normal;
            line-height: 1.4;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .help-tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* Highlight yellow row animation */
        @keyframes rowHighlight {
            0% {
                background-color: rgba(224, 154, 58, 0.4);
            }

            100% {
                background-color: transparent;
            }
        }

        .row-flash-yellow {
            animation: rowHighlight 2s ease-out;
        }

        /* Print formatting */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }

            .no-print {
                display: none !important;
            }

            .print-only {
                display: block !important;
            }

            .print-container {
                width: 100% !important;
                max-width: none !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                background: white !important;
                color: black !important;
            }
        }
    </style>
</head>

<body>
    <!-- Target Container for React -->
    <div id="root"></div>

    <!-- React App Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Constants matching instructions
        const API_KEY = 'eureka-dev-key-change-me';
        // Note: Backend default port is 8001 in our workspace, but prompt requested 8000.
        // We will define default base and write a dynamic prober to adapt to either port 8001 or 8000!
        const API_BASE_8001 = 'http://localhost:8001';
        const API_BASE_8000 = 'http://localhost:8000';

        // Styling definitions as JS inline objects
        const s = {
            navBar: {
                position: 'fixed',
                top: 0,
                left: 0,
                right: 0,
                height: '48px',
                backgroundColor: '#1E2227',
                borderBottom: '1px solid #3A3F4B',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                padding: '0 20px',
                zIndex: 1000
            },
            logoContainer: {
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                fontFamily: "'Outfit', sans-serif",
                fontWeight: '800',
                fontSize: '15px',
                color: '#4A80E0',
                letterSpacing: '0.5px'
            },
            tabsContainer: {
                display: 'flex',
                height: '100%',
                alignItems: 'center',
                gap: '4px'
            },
            tabButton: (isActive) => ({
                height: '100%',
                padding: '0 16px',
                backgroundColor: 'transparent',
                border: 'none',
                color: isActive ? '#E8EAF0' : '#8B919E',
                fontFamily: 'inherit',
                fontSize: '12.5px',
                fontWeight: '600',
                cursor: 'pointer',
                borderBottom: isActive ? '3px solid #4A80E0' : '3px solid transparent',
                transition: 'all 0.2s',
                outline: 'none',
                display: 'flex',
                alignItems: 'center',
                gap: '6px'
            }),
            statusIndicator: {
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                fontSize: '11px',
                color: '#8B919E'
            },
            statusDot: (isOnline) => ({
                width: '8px',
                height: '8px',
                borderRadius: '50%',
                backgroundColor: isOnline ? '#52C47A' : '#E05252',
                boxShadow: isOnline ? '0 0 8px #52C47A' : '0 0 8px #E05252',
                transition: 'background-color 0.3s'
            }),
            mainContent: {
                marginTop: '48px',
                padding: '24px',
                minHeight: 'calc(100vh - 48px)',
                backgroundColor: '#1E2227',
                color: '#E8EAF0'
            },
            viewGrid: {
                display: 'flex',
                gap: '24px',
                flexWrap: 'wrap'
            },
            leftPanel: {
                flex: '0 0 400px',
                maxWidth: '400px',
                display: 'flex',
                flexDirection: 'column',
                gap: '20px'
            },
            rightPanel: {
                flex: '1 1 500px',
                display: 'flex',
                flexDirection: 'column',
                gap: '20px'
            },
            card: {
                backgroundColor: '#272B33',
                border: '1px solid #3A3F4B',
                borderRadius: '6px',
                padding: '16px',
                boxShadow: '0 4px 6px rgba(0,0,0,0.15)'
            },
            cardTitle: {
                fontFamily: "'Outfit', sans-serif",
                fontSize: '12px',
                fontWeight: '700',
                color: '#8B919E',
                letterSpacing: '0.8px',
                textTransform: 'uppercase',
                marginBottom: '12px',
                borderBottom: '1px solid #3A3F4B',
                paddingBottom: '4px'
            },
            formGroup: {
                display: 'flex',
                flexDirection: 'column',
                gap: '4px',
                marginBottom: '10px'
            },
            label: {
                fontSize: '11px',
                color: '#8B919E',
                fontWeight: '500'
            },
            input: {
                backgroundColor: '#2F3540',
                border: '1px solid #3A3F4B',
                color: '#E8EAF0',
                padding: '6px 10px',
                fontSize: '12.5px',
                borderRadius: '4px',
                outline: 'none',
                fontFamily: 'inherit'
            },
            presetGrid: {
                display: 'grid',
                gridTemplateColumns: 'repeat(3, 1fr)',
                gap: '8px'
            },
            presetCard: {
                backgroundColor: '#2F3540',
                border: '1px solid #3A3F4B',
                borderRadius: '4px',
                padding: '8px',
                cursor: 'pointer',
                textAlign: 'center',
                transition: 'all 0.2s'
            },
            table: {
                width: '100%',
                borderCollapse: 'collapse',
                fontSize: '12px',
                textAlign: 'left'
            },
            th: {
                borderBottom: '1px solid #3A3F4B',
                padding: '8px',
                color: '#8B919E',
                fontWeight: '600',
                fontSize: '11px'
            },
            td: {
                padding: '6px 8px',
                borderBottom: '1px solid #3A3F4B'
            },
            btn: (variant) => {
                const colors = {
                    primary: { bg: '#4A80E0', text: '#fff', hover: '#3b6ec2' },
                    secondary: { bg: '#2F3540', text: '#8B919E', hover: '#3b4250' },
                    danger: { bg: 'transparent', text: '#E05252', hover: 'rgba(224,82,82,0.1)' }
                };
                const col = colors[variant] || colors.primary;
                return {
                    backgroundColor: col.bg,
                    color: col.text,
                    border: variant === 'danger' ? '1px solid #E05252' : 'none',
                    borderRadius: '4px',
                    padding: '8px 16px',
                    fontSize: '12px',
                    fontWeight: '600',
                    cursor: 'pointer',
                    transition: 'background-color 0.2s',
                    outline: 'none',
                    display: 'inline-flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    gap: '6px'
                };
            },
            badge: (color) => ({
                width: '14px',
                height: '14px',
                borderRadius: '50%',
                backgroundColor: color,
                color: '#fff',
                fontSize: '9px',
                fontWeight: 'bold',
                display: 'inline-flex',
                alignItems: 'center',
                justifyContent: 'center'
            })
        };

        function App() {
            // State
            const [activeTab, setActiveTab] = useState('validate');
            const [apiBase, setApiBase] = useState(API_BASE_8001);
            const [isOnline, setIsOnline] = useState(false);
            const [rulesCount, setRulesCount] = useState(24);
            const [processes, setProcesses] = useState([]);

            // CAD Environment Detection
            const isFusion = typeof window.adsk !== 'undefined';
            const isCatia = typeof window.chrome !== 'undefined' && typeof window.chrome.webview !== 'undefined';
            const isInsideCAD = isFusion || isCatia;

            const sendToCAD = (action, data) => {
                if (typeof window.adsk !== 'undefined') {
                    window.adsk.fusionSendData(action, JSON.stringify(data || {}));
                } else if (typeof window.chrome !== 'undefined' && typeof window.chrome.webview !== 'undefined') {
                    window.chrome.webview.postMessage({ action, data });
                } else {
                    console.log("Mock CAD postMessage:", action, data);
                }
            };

            // Hook window.adsk notify for Fusion 360 & WebMessageReceived for CATIA (WebView2)
            useEffect(() => {
                window.eurekaTriggerAction = (action, data) => {
                    console.log("CAD incoming action:", action, data);
                    if (action === 'load_part') {
                        const part = typeof data === 'string' ? JSON.parse(data) : data;
                        setPartName(part.filename || part.part_name || 'CAD Part');
                        if (part.process) setProcess(part.process);
                        if (part.material) setMaterial(part.material);
                        if (part.nominal_wall_mm) setNominalWall(part.nominal_wall_mm);
                        
                        if (part.faces && part.faces.length > 0) {
                            const mappedFaces = part.faces.map(f => ({
                                face_id: f.face_id,
                                face_type_label: f.face_type === 'Plane' ? 'Plane (Flat)' :
                                                 f.face_type === 'Cylinder' ? 'Cylinder (Round)' :
                                                 f.face_type === 'Cone' ? 'Cone (Tapered)' :
                                                 f.face_type === 'Sphere' ? 'Sphere (Curved)' :
                                                 f.face_type === 'Torus' ? 'Torus (Donut)' :
                                                 f.face_type === 'BSpline' ? 'BSpline (Complex)' : f.face_type,
                                thickness_mm: f.thickness_mm || 1.5,
                                radius_mm: f.radius_mm || 0,
                                area_mm2: f.area_mm2 || 0,
                                depth_mm: f.depth_mm || 0,
                                width_mm: f.width_mm || 0,
                                curvature_min: f.curvature_min || 0,
                                curvature_max: f.curvature_max || 0,
                                draft_angle_deg: f.draft_angle_deg || 0,
                                parent_wall_mm: f.parent_wall_thickness_mm || 1.5,
                                centroid_dist_mm: f.centroid_x ? Math.sqrt(f.centroid_x*f.centroid_x + f.centroid_y*f.centroid_y + f.centroid_z*f.centroid_z) : 0
                            }));
                            setFaces(mappedFaces);
                        }
                        if (part.adjacency) {
                            setAdjacencyList(part.adjacency);
                            const text = part.adjacency.map(pair => `F${pair[0] + 1}-F${pair[1] + 1}`).join(", ");
                            setAdjacencyText(text);
                            setUseCustomAdjacency(true);
                        }

                        // Auto-validate loaded part
                        setTimeout(() => {
                            const finalPayload = {
                                part_name: part.filename || part.part_name || 'CAD Part',
                                process: part.process || 'injection_molding',
                                material: part.material || 'ABS',
                                nominal_wall_mm: parseFloat(part.nominal_wall_mm || 1.5),
                                faces: part.faces.map(f => ({
                                    face_id: f.face_id,
                                    face_type: f.face_type || 'Plane',
                                    area_mm2: f.area_mm2 || 0,
                                    thickness_mm: f.thickness_mm || 0,
                                    draft_angle_deg: f.draft_angle_deg || 0,
                                    radius_mm: f.radius_mm || 0,
                                    depth_mm: f.depth_mm || 0,
                                    width_mm: f.width_mm || 0,
                                    parent_wall_thickness_mm: f.parent_wall_thickness_mm || 1.5,
                                    curvature_min: f.curvature_min || 0,
                                    curvature_max: f.curvature_max || 0,
                                    centroid_x: f.centroid_x || 0,
                                    centroid_y: f.centroid_y || 0,
                                    centroid_z: f.centroid_z || 0,
                                    normal_x: f.normal_x || 0,
                                    normal_y: f.normal_y || 0,
                                    normal_z: f.normal_z || 1
                                })),
                                adjacency: part.adjacency || []
                            };
                            performValidation(finalPayload);
                        }, 200);
                    }
                };

                if (typeof window.adsk !== 'undefined') {
                    window.adsk.fusionNotify = function(action, data) {
                        window.eurekaTriggerAction(action, data);
                    };
                }

                if (typeof window.chrome !== 'undefined' && typeof window.chrome.webview !== 'undefined') {
                    const handleWebviewMessage = (event) => {
                        if (event.data && event.data.action) {
                            window.eurekaTriggerAction(event.data.action, event.data.data);
                        }
                    };
                    window.chrome.webview.addEventListener('message', handleWebviewMessage);
                    return () => {
                        window.chrome.webview.removeEventListener('message', handleWebviewMessage);
                        delete window.eurekaTriggerAction;
                    };
                }

                return () => {
                    delete window.eurekaTriggerAction;
                };
            }, [apiBase, faces, adjacencyList]);

            // Validate Form State
            const [partName, setPartName] = useState('My Part');
            const [process, setProcess] = useState('injection_molding');
            const [material, setMaterial] = useState('ABS');
            const [nominalWall, setNominalWall] = useState(1.5);
            const [faces, setFaces] = useState([
                {
                    face_id: 'F1',
                    face_type_label: 'Plane (Flat)',
                    thickness_mm: 1.5,
                    radius_mm: 2.0,
                    area_mm2: 5000.0,
                    depth_mm: 0.0,
                    width_mm: 50.0,
                    curvature_min: 0.0,
                    curvature_max: 0.0,
                    draft_angle_deg: 2.0,
                    parent_wall_mm: 1.5,
                    centroid_dist_mm: 10.0
                }
            ]);
            const [adjacencyList, setAdjacencyList] = useState([]);
            const [adjacencyText, setAdjacencyText] = useState('F1-F2');
            const [useCustomAdjacency, setUseCustomAdjacency] = useState(false);

            // Selection highlights
            const [flashedRowId, setFlashedRowId] = useState(null);
            const rowRefs = useRef({});

            // Validation Results State
            const [validationResult, setValidationResult] = useState(null);
            const [expandedViolation, setExpandedViolation] = useState(null);
            const [expandedFixPanel, setExpandedFixPanel] = useState(null);
            const [reportMarkdown, setReportMarkdown] = useState('');
            const [interactiveChecklist, setInteractiveChecklist] = useState([
                { id: 1, text: "All critical DFM violations resolved", checked: false },
                { id: 2, text: "All warning violations reviewed and signed off", checked: false },
                { id: 3, text: "Material compatibility and flow characteristics confirmed", checked: false },
                { id: 4, text: "Nominal wall thickness variation is within acceptable tolerance range", checked: false },
                { id: 5, text: "GNN anomaly interaction risk level below acceptable threshold (0.50)", checked: false }
            ]);

            // Stepper progress states
            const [showLoading, setShowLoading] = useState(false);
            const [loadingStep, setLoadingStep] = useState(0); // 0 = Idle, 1 = Extract, 2 = Rules, 3 = GNN, 4 = Report
            const [validationError, setValidationError] = useState('');

            // CAD Guide Collapsible Active Tab
            const [cadGuideTab, setCadGuideTab] = useState('SolidWorks');

            // Probe backend health to find port
            useEffect(() => {
                async function probeBackend() {
                    const checkPort = async (base) => {
                        try {
                            const res = await fetch(`${base}/health`);
                            if (res.ok) {
                                const data = await res.json();
                                if (data.status === 'ok') {
                                    setApiBase(base);
                                    setIsOnline(true);
                                    fetchProcesses(base);
                                    return true;
                                }
                            }
                        } catch (e) { }
                        return false;
                    };

                    // First try 8001 (default workspace), then try 8000
                    const found8001 = await checkPort(API_BASE_8001);
                    if (!found8001) {
                        await checkPort(API_BASE_8000);
                    }
                }
                probeBackend();
            }, []);

            async function fetchProcesses(base) {
                try {
                    const res = await fetch(`${base}/processes`);
                    if (res.ok) {
                        const data = await res.json();
                        setProcesses(data);
                    }
                } catch (e) { }
            }

            // Presets loader
            async function loadPreset(presetIndex) {
                try {
                    const res = await fetch(`${apiBase}/web/presets`);
                    if (res.ok) {
                        const presets = await res.json();
                        const p = presets[presetIndex];
                        if (p) {
                            setPartName(p.name);
                            setProcess(p.process);
                            setMaterial(p.material);
                            setNominalWall(p.nominal_wall_mm || 1.5);
                            setFaces(p.faces);
                            setAdjacencyList(p.adjacency);
                            // Build standard adjacency text
                            const text = p.adjacency.map(pair => `F${pair[0] + 1}-F${pair[1] + 1}`).join(", ");
                            setAdjacencyText(text);
                            setUseCustomAdjacency(true);
                            console.log(`Loaded preset: ${p.name}`);
                        }
                    }
                } catch (e) {
                    alert("Failed to load presets from backend. Please verify backend connection.");
                }
            }

            // Row add/delete
            function addFaceRow() {
                const id = `F${faces.length + 1}`;
                const newFace = {
                    face_id: id,
                    face_type_label: 'Plane (Flat)',
                    thickness_mm: 1.5,
                    radius_mm: 0.0,
                    area_mm2: 1000.0,
                    depth_mm: 0.0,
                    width_mm: 20.0,
                    curvature_min: 0.0,
                    curvature_max: 0.0,
                    draft_angle_deg: 1.5,
                    parent_wall_mm: 1.5,
                    centroid_dist_mm: 0.0
                };
                setFaces([...faces, newFace]);
            }

            function deleteFaceRow(index) {
                const list = [...faces];
                list.splice(index, 1);
                // Re-align IDs sequentially
                const updated = list.map((f, idx) => ({
                    ...f,
                    face_id: `F${idx + 1}`
                }));
                setFaces(updated);
            }

            function updateFaceValue(index, field, val) {
                const list = [...faces];
                list[index][field] = val;
                setFaces(list);
            }

            // Fill default adjacency
            function applyDefaultAdjacency() {
                const list = [];
                for (let i = 0; i < faces.length - 1; i++) {
                    list.push([i, i + 1]);
                }
                if (faces.length > 2) {
                    list.push([faces.length - 1, 0]); // Loop back
                }
                setAdjacencyList(list);
                const text = list.map(pair => `F${pair[0] + 1}-F${pair[1] + 1}`).join(", ");
                setAdjacencyText(text);
                setUseCustomAdjacency(true);
            }

            // Parse text adjacency: "F1-F2, F2-F3"
            function parseAdjacencyText(text) {
                const list = [];
                const pairs = text.split(",");
                pairs.forEach(p => {
                    const match = p.trim().match(/^F(\d+)-F(\d+)$/i);
                    if (match) {
                        const u = parseInt(match[1]) - 1;
                        const v = parseInt(match[2]) - 1;
                        if (u >= 0 && u < faces.length && v >= 0 && v < faces.length) {
                            list.push([u, v]);
                        }
                    }
                });
                return list;
            }

            // Modular validation function
            async function performValidation(payload) {
                setValidationError('');
                setShowLoading(true);

                // Stepper Progression Delays
                setLoadingStep(1);
                await delay(500);
                setLoadingStep(2);
                await delay(700);
                setLoadingStep(3);
                await delay(800);
                setLoadingStep(4);

                try {
                    const res = await fetch(`${apiBase}/web/validate-graph`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': API_KEY
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.detail || `HTTP ${res.status}: ${res.statusText}`);
                    }

                    const result = await res.json();

                    // Parse score if mapped as overall_manufacturability_score
                    const finalScore = result.overall_manufacturability_score !== undefined ? result.overall_manufacturability_score : result.score;
                    result.score = finalScore;

                    setValidationResult(result);

                    // Trigger Report fetch
                    try {
                        const repRes = await fetch(`${apiBase}/report`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-API-Key': API_KEY
                            },
                            body: JSON.stringify(result)
                        });
                        if (repRes.ok) {
                            const repData = await repRes.json();
                            setReportMarkdown(repData.report);
                        }
                    } catch (e) {
                        console.warn("Failed to fetch custom report narrative, generating fallback client-side.");
                    }

                    // Done
                    setShowLoading(false);
                    setLoadingStep(0);
                    setActiveTab('results');
                } catch (e) {
                    console.error(e);
                    setShowLoading(false);
                    setLoadingStep(0);
                    setValidationError(e.message || "Failed to contact DFM Validation backend.");
                }
            }

            // Run validation handler
            async function runDFMValidation() {
                setValidationError('');
                // Validate inputs
                const invalid = faces.some(f => !f.face_id || f.area_mm2 <= 0 || f.thickness_mm <= 0);
                if (invalid) {
                    setValidationError('Validation failed: Please ensure all Face IDs are filled and Area/Thickness are positive numbers.');
                    return;
                }

                // Build adjacency list
                let finalAdjacency = adjacencyList;
                if (!useCustomAdjacency) {
                    // Default assume sequential
                    finalAdjacency = [];
                    for (let i = 0; i < faces.length - 1; i++) {
                        finalAdjacency.push([i, i + 1]);
                    }
                    if (faces.length > 2) finalAdjacency.push([faces.length - 1, 0]);
                } else if (adjacencyText) {
                    finalAdjacency = parseAdjacencyText(adjacencyText);
                }

                // Compile request payload
                const payload = {
                    part_name: partName,
                    process: process,
                    material: material,
                    nominal_wall_mm: parseFloat(nominalWall),
                    faces: faces.map(f => ({
                        face_id: f.face_id,
                        face_type: f.face_type_label === 'Plane (Flat)' ? 'Plane' :
                                   f.face_type_label === 'Cylinder (Round)' ? 'Cylinder' :
                                   f.face_type_label === 'Cone (Tapered)' ? 'Cone' :
                                   f.face_type_label === 'Sphere (Curved)' ? 'Sphere' :
                                   f.face_type_label === 'Torus (Donut)' ? 'Torus' :
                                   f.face_type_label === 'BSpline (Complex)' ? 'BSpline' : f.face_type_label,
                        area_mm2: parseFloat(f.area_mm2) || 0,
                        thickness_mm: parseFloat(f.thickness_mm) || 0,
                        draft_angle_deg: parseFloat(f.draft_angle_deg) || 0,
                        radius_mm: parseFloat(f.radius_mm) || 0,
                        depth_mm: parseFloat(f.depth_mm) || 0,
                        width_mm: parseFloat(f.width_mm) || 0,
                        parent_wall_thickness_mm: parseFloat(f.parent_wall_mm) || 1.5,
                        curvature_min: parseFloat(f.curvature_min) || 0,
                        curvature_max: parseFloat(f.curvature_max) || 0,
                        centroid_x: 0, // centroids/normals defaults for GNN compatibility
                        centroid_y: 0,
                        centroid_z: parseFloat(f.centroid_dist_mm) || 0,
                        normal_x: 0,
                        normal_y: 0,
                        normal_z: 1
                    })),
                    adjacency: finalAdjacency
                };

                await performValidation(payload);
            }

            // Delay helper
            function delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            // Violation detail focus helper
            function focusFaceRow(faceId) {
                setActiveTab('validate');
                setFlashedRowId(faceId);
                setTimeout(() => {
                    const row = rowRefs.current[faceId];
                    if (row) {
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 200);
                // Clear flash after 2s
                setTimeout(() => setFlashedRowId(null), 2000);
            }

            function selectFaceFromResultsTable(faceId) {
                // Find first violation related to this face and expand it
                const viols = validationResult?.violations || [];
                const match = viols.find(v => (v.face_ids && v.face_ids.includes(faceId)) || v.face_id === faceId);
                if (match) {
                    setExpandedViolation(match.rule_id);
                    // Scroll to card
                    const card = document.getElementById(`viol-card-${match.rule_id}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }

            // Clipboard narrative helper
            function copyReportToClipboard() {
                const text = reportMarkdown || "No report generated.";
                navigator.clipboard.writeText(text).then(() => {
                    alert("Report copied to clipboard!");
                });
            }

            // Dynamic severity colors
            function getSeverityColor(sev) {
                const s = (sev || '').toUpperCase();
                if (s === 'CRITICAL') return '#E05252';
                if (s === 'WARNING') return '#E09A3A';
                return '#4A9EE0';
            }

            // Render elements
            return (
                <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh', backgroundColor: '#1E2227' }}>
                    {/* Fixed Navbar */}
                    <nav style={s.navBar} className="no-print">
                        <div style={s.logoContainer}>
                            <span>⬡</span>
                            <span>EUREKA DFM 3.0</span>
                        </div>

                        <div style={s.tabsContainer}>
                            <button style={s.tabButton(activeTab === 'validate')} onClick={() => setActiveTab('validate')}>
                                Validate
                            </button>
                            <button style={s.tabButton(activeTab === 'results')} onClick={() => setActiveTab('results')} disabled={!validationResult}>
                                Results
                                {validationResult && validationResult.violations?.length > 0 && (
                                    <span style={s.badge('#E05252')}>{validationResult.violations.length}</span>
                                )}
                            </button>
                            <button style={s.tabButton(activeTab === 'report')} onClick={() => setActiveTab('report')} disabled={!validationResult}>
                                Report
                            </button>
                            <button style={s.tabButton(activeTab === 'about')} onClick={() => setActiveTab('about')}>
                                About
                            </button>
                        </div>

                        <div style={s.statusIndicator}>
                            <div style={s.statusDot(isOnline)}></div>
                            <span>{apiBase.replace('http://', '')}</span>
                        </div>
                    </nav>

                    {/* Main Workspace content */}
                    <main style={s.mainContent} className="print-container">
                        {validationError && (
                            <div style={{ ...s.card, borderColor: '#E05252', backgroundColor: 'rgba(224,82,82,0.1)', marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <span style={{ fontSize: '18px', fontWeight: 'bold' }}>⚠</span>
                                <span>{validationError}</span>
                            </div>
                        )}

                        {/* --- TAB 1: VALIDATE --- */}
                        {activeTab === 'validate' && (
                            <div style={s.viewGrid}>
                                {/* Left configuration side pane */}
                                <div style={s.leftPanel} className="no-print">
                                    {isInsideCAD && (
                                        <div style={{ ...s.card, display: 'flex', flexDirection: 'column', gap: '10px', backgroundColor: '#202E44', borderColor: '#4A80E0', marginBottom: '10px' }}>
                                            <h3 style={{ ...s.cardTitle, color: '#4A80E0', borderBottomColor: 'rgba(74, 128, 224, 0.3)', marginBottom: '4px' }}>CAD Integration Active</h3>
                                            <p style={{ fontSize: '11px', color: '#8B919E', lineHeight: '1.4' }}>
                                                Direct connection to active CAD viewport is active. Pull geometry to run automated GNN validation checks.
                                            </p>
                                            <button
                                                style={{ ...s.btn('primary'), width: '100%', height: '36px' }}
                                                onClick={() => sendToCAD('request_geometry')}
                                            >
                                                🔄 Pull Geometry from CAD
                                            </button>
                                        </div>
                                    )}
                                    {/* Part Info Panel */}
                                    <div style={s.card}>
                                        <h3 style={s.cardTitle}>Part Settings</h3>
                                        <div style={s.formGroup}>
                                            <label style={s.label}>Part / Design Name</label>
                                            <input style={s.input} type="text" value={partName} onChange={(e) => setPartName(e.target.value)} />
                                        </div>
                                        <div style={s.formGroup}>
                                            <label style={s.label}>Manufacturing Process</label>
                                            <select style={s.input} value={process} onChange={(e) => setProcess(e.target.value)}>
                                                <option value="injection_moulding">Injection Molding</option>
                                                <option value="die_cast_al">Die Casting (Aluminium)</option>
                                                <option value="cnc">CNC Machining</option>
                                            </select>
                                        </div>
                                        <div style={s.formGroup}>
                                            <label style={s.label}>Material Alloy</label>
                                            <input style={s.input} type="text" value={material} onChange={(e) => setMaterial(e.target.value)} />
                                        </div>
                                        <div style={s.formGroup}>
                                            <label style={s.label}>Nominal Wall Thickness (mm)</label>
                                            <input style={s.input} type="number" step="0.1" value={nominalWall} onChange={(e) => setNominalWall(parseFloat(e.target.value) || 0)} />
                                        </div>
                                    </div>

                                    {/* Preset selection panels */}
                                    <div style={s.card}>
                                        <h3 style={s.cardTitle}>Load Demo Preset</h3>
                                        <div style={s.presetGrid}>
                                            <div style={s.presetCard} onClick={() => loadPreset(0)}>
                                                <div style={{ fontWeight: '700', color: '#E05252', fontSize: '10px' }}>MOULDING</div>
                                                <div style={{ fontSize: '11px', color: '#E8EAF0', margin: '4px 0' }}>Thin Wall</div>
                                                <div style={{ fontSize: '9px', color: '#8B919E' }}>PC/ABS</div>
                                            </div>
                                            <div style={s.presetCard} onClick={() => loadPreset(1)}>
                                                <div style={{ fontWeight: '700', color: '#E09A3A', fontSize: '10px' }}>DIE CAST</div>
                                                <div style={{ fontSize: '11px', color: '#E8EAF0', margin: '4px 0' }}>Housing</div>
                                                <div style={{ fontSize: '9px', color: '#8B919E' }}>Al-380</div>
                                            </div>
                                            <div style={s.presetCard} onClick={() => loadPreset(2)}>
                                                <div style={{ fontWeight: '700', color: '#52C47A', fontSize: '10px' }}>CNC</div>
                                                <div style={{ fontSize: '11px', color: '#E8EAF0', margin: '4px 0' }}>Bracket</div>
                                                <div style={{ fontSize: '9px', color: '#8B919E' }}>Steel</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* CAD Guides accordion */}
                                    <div style={s.card}>
                                        <h3 style={s.cardTitle}>CAD Measurement Guide</h3>
                                        <div style={{ display: 'flex', borderBottom: '1px solid #3A3F4B', marginBottom: '8px' }}>
                                            {['SolidWorks', 'CATIA', 'Fusion 360', 'NX', 'Manual'].map(tab => (
                                                <button
                                                    key={tab}
                                                    onClick={() => setCadGuideTab(tab)}
                                                    style={{
                                                        padding: '4px 8px',
                                                        fontSize: '11px',
                                                        fontWeight: 'bold',
                                                        backgroundColor: 'transparent',
                                                        border: 'none',
                                                        borderBottom: cadGuideTab === tab ? '2px solid #4A80E0' : '2px solid transparent',
                                                        color: cadGuideTab === tab ? '#E8EAF0' : '#8B919E',
                                                        cursor: 'pointer'
                                                    }}
                                                >
                                                    {tab}
                                                </button>
                                            ))}
                                        </div>
                                        <div style={{ fontSize: '11.5px', color: '#8B919E', lineHeight: '1.4' }}>
                                            {cadGuideTab === 'SolidWorks' && (
                                                <ol style={{ paddingLeft: '16px' }}>
                                                    <li><b>Thickness</b>: Evaluate > Thickness Analysis</li>
                                                    <li><b>Draft</b>: Evaluate > Draft Analysis</li>
                                                    <li><b>Area</b>: Face properties > Area</li>
                                                    <li><b>Radius</b>: Measure edge radius</li>
                                                    <li><b>Centroid</b>: Evaluate > Mass Properties</li>
                                                </ol>
                                            )}
                                            {cadGuideTab === 'Fusion 360' && (
                                                <ol style={{ paddingLeft: '16px' }}>
                                                    <li><b>Thickness</b>: Inspect > Thickness Analysis</li>
                                                    <li><b>Draft</b>: Inspect > Draft Analysis</li>
                                                    <li><b>Area</b>: right-click face > Properties</li>
                                                    <li><b>Radius</b>: Inspect > Measure edge</li>
                                                    <li><b>Centroid</b>: Select face and read properties</li>
                                                </ol>
                                            )}
                                            {cadGuideTab === 'CATIA' && (
                                                <ol style={{ paddingLeft: '16px' }}>
                                                    <li><b>Thickness</b>: Use Measure Between tool</li>
                                                    <li><b>Draft</b>: Apply Draft Analysis window</li>
                                                    <li><b>Area</b>: Measure Item > click face</li>
                                                    <li><b>Radius</b>: Measure edge radius</li>
                                                    <li><b>Centroid</b>: Coordinate display</li>
                                                </ol>
                                            )}
                                            {cadGuideTab === 'NX' && (
                                                <ol style={{ paddingLeft: '16px' }}>
                                                    <li><b>Thickness</b>: Analysis > Wall Thickness</li>
                                                    <li><b>Draft</b>: Analysis > Draft Analysis</li>
                                                    <li><b>Area</b>: Measure > select face</li>
                                                    <li><b>Radius</b>: Measure edge arc</li>
                                                    <li><b>Centroid</b>: Analyze geometry centroid</li>
                                                </ol>
                                            )}
                                            {cadGuideTab === 'Manual' && (
                                                <p>If your CAD tool is not listed, use digital calipers or measure off the engineering drawing. Enter 0 for Curvature values if they are unknown.</p>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Right Table entry panel */}
                                <div style={s.rightPanel}>
                                    <div style={s.card}>
                                        <h3 style={s.cardTitle}>12-D Face Topology Matrix</h3>
                                        <div style={{ overflowX: 'auto', marginBottom: '12px' }}>
                                            <table style={s.table}>
                                                <thead>
                                                    <tr>
                                                        <th style={s.th}>ID</th>
                                                        <th style={s.th}>
                                                            Type
                                                            <span className="help-tooltip">?
                                                                <span className="tooltiptext">Geometric surface type. Planes map to 0.0, cylinders to 0.14.</span>
                                                            </span>
                                                        </th>
                                                        <th style={s.th}>Wall (mm)</th>
                                                        <th style={s.th}>Radius (mm)</th>
                                                        <th style={s.th}>Area (mm²)</th>
                                                        <th style={s.th}>Depth (mm)</th>
                                                        <th style={s.th}>Width (mm)</th>
                                                        <th style={s.th}>Draft (°)</th>
                                                        <th style={s.th}>Parent Wall</th>
                                                        <th style={s.th}>Centroid Dist</th>
                                                        <th style={s.th}>Aspect</th>
                                                        <th style={s.th}>Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {faces.map((f, idx) => {
                                                        const aspect = f.width_mm > 0 ? (f.depth_mm / (f.width_mm + 0.001)).toFixed(2) : '0.00';
                                                        const isFlashed = flashedRowId === f.face_id;

                                                        return (
                                                            <tr
                                                                key={idx}
                                                                ref={el => rowRefs.current[f.face_id] = el}
                                                                className={isFlashed ? 'row-flash-yellow' : ''}
                                                                style={{ transition: 'all 0.3s', cursor: isInsideCAD ? 'pointer' : 'default' }}
                                                                onMouseEnter={() => { if (isInsideCAD) sendToCAD('highlight_faces', { face_ids: [f.face_id] }); }}
                                                                onMouseLeave={() => { if (isInsideCAD) sendToCAD('clear_view'); }}
                                                            >
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '45px', padding: '3px' }} type="text" value={f.face_id} onChange={(e) => updateFaceValue(idx, 'face_id', e.target.value)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <select style={{ ...s.input, width: '90px', padding: '3px' }} value={f.face_type_label} onChange={(e) => updateFaceValue(idx, 'face_type_label', e.target.value)}>
                                                                        <option value="Plane (Flat)">Plane</option>
                                                                        <option value="Cylinder (Round)">Cylinder</option>
                                                                        <option value="Cone (Tapered)">Cone</option>
                                                                        <option value="Sphere (Curved)">Sphere</option>
                                                                        <option value="Torus (Donut)">Torus</option>
                                                                        <option value="BSpline (Complex)">BSpline</option>
                                                                        <option value="Other">Other</option>
                                                                    </select>
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="0.1" value={f.thickness_mm} onChange={(e) => updateFaceValue(idx, 'thickness_mm', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="0.1" value={f.radius_mm} onChange={(e) => updateFaceValue(idx, 'radius_mm', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '65px', padding: '3px' }} type="number" step="10" value={f.area_mm2} onChange={(e) => updateFaceValue(idx, 'area_mm2', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="0.5" value={f.depth_mm} onChange={(e) => updateFaceValue(idx, 'depth_mm', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="0.5" value={f.width_mm} onChange={(e) => updateFaceValue(idx, 'width_mm', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="0.5" value={f.draft_angle_deg} onChange={(e) => updateFaceValue(idx, 'draft_angle_deg', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="0.1" value={f.parent_wall_mm} onChange={(e) => updateFaceValue(idx, 'parent_wall_mm', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={s.td}>
                                                                    <input style={{ ...s.input, width: '50px', padding: '3px' }} type="number" step="5" value={f.centroid_dist_mm} onChange={(e) => updateFaceValue(idx, 'centroid_dist_mm', parseFloat(e.target.value) || 0)} />
                                                                </td>
                                                                <td style={{ ...s.td, color: '#8B919E', fontWeight: '500' }}>{aspect}</td>
                                                                <td style={s.td}>
                                                                    <button style={s.btn('danger')} onClick={() => deleteFaceRow(idx)}>×</button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                        <button style={s.btn('secondary')} onClick={addFaceRow}>+ Add Face Row</button>
                                    </div>

                                    {/* Adjacency list configurations */}
                                    <div style={s.card}>
                                        <h3 style={s.cardTitle}>Topology Adjacency Matrix</h3>
                                        <div style={{ display: 'flex', gap: '16px', alignItems: 'center', marginBottom: '12px' }}>
                                            <button style={s.btn('secondary')} onClick={applyDefaultAdjacency}>Use Default Connectivity</button>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '11px', color: '#8B919E', cursor: 'pointer' }}>
                                                <input type="checkbox" checked={useCustomAdjacency} onChange={(e) => setUseCustomAdjacency(e.target.checked)} />
                                                Edit Custom Connections
                                            </label>
                                        </div>
                                        {useCustomAdjacency && (
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                                <label style={s.label}>Adjacent Face Pairs (e.g. F1-F2, F2-F3)</label>
                                                <input style={s.input} type="text" value={adjacencyText} onChange={(e) => setAdjacencyText(e.target.value)} />
                                                <span style={{ fontSize: '10px', color: '#8B919E' }}>Specify pairs of faces that share a topological edge. This builds the edge_index graph structure for GNN prediction.</span>
                                            </div>
                                        )}
                                    </div>

                                    {/* Submit action panel */}
                                    <button
                                        style={{ ...s.btn('primary'), width: '100%', height: '48px', fontSize: '14px' }}
                                        onClick={runDFMValidation}
                                        disabled={faces.length === 0}
                                    >
                                        Run DFM Validation →
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- TAB 2: RESULTS --- */}
                        {activeTab === 'results' && validationResult && (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                                {/* Score Dashboard Panel */}
                                <div style={{ ...s.card, display: 'flex', flexWrap: 'wrap', gap: '20px', alignItems: 'center', justifyContent: 'space-between' }}>

                                    {/* SVG Semicircle Gauge */}
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                        <svg width="120" height="90" viewBox="0 0 100 80">
                                            <path d="M 10 70 A 40 40 0 0 1 90 70" fill="none" stroke="#2F3540" strokeWidth="8" strokeLinecap="round" />
                                            {/* Fill offset based on score */}
                                            <path
                                                d="M 10 70 A 40 40 0 0 1 90 70"
                                                fill="none"
                                                stroke={validationResult.score >= 80 ? '#52C47A' : (validationResult.score >= 60 ? '#E09A3A' : '#E05252')}
                                                strokeWidth="8"
                                                strokeLinecap="round"
                                                strokeDasharray="125.6"
                                                strokeDashoffset={125.6 - (125.6 * (validationResult.score || 0)) / 100}
                                                style={{ transition: 'stroke-dashoffset 0.8s ease' }}
                                            />
                                            <text x="50" y="55" textAnchor="middle" fill="#E8EAF0" fontSize="16" fontWeight="bold">{validationResult.score}</text>
                                            <text x="50" y="72" textAnchor="middle" fill="#8B919E" fontSize="7" fontWeight="bold">DFM SCORE</text>
                                        </svg>
                                        <div>
                                            <h4 style={{ fontSize: '14px', fontWeight: 'bold' }}>Part Health: {validationResult.score >= 80 ? 'EXCELLENT' : (validationResult.score >= 60 ? 'MODERATE' : 'HIGH RISK')}</h4>
                                            <span style={{ fontSize: '11px', color: '#8B919E' }}>Estimated overall manufacturability rating</span>
                                        </div>
                                    </div>

                                    {/* Counts pills */}
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <div style={{ backgroundColor: 'rgba(224,82,82,0.15)', border: '1px solid #E05252', borderRadius: '4px', padding: '6px 12px', textAlign: 'center' }}>
                                            <span style={{ color: '#E05252', fontWeight: 'bold', fontSize: '14px' }}>{validationResult.summary?.critical || 0}</span>
                                            <div style={{ fontSize: '9px', color: '#8B919E' }}>CRITICAL</div>
                                        </div>
                                        <div style={{ backgroundColor: 'rgba(224,154,58,0.15)', border: '1px solid #E09A3A', borderRadius: '4px', padding: '6px 12px', textAlign: 'center' }}>
                                            <span style={{ color: '#E09A3A', fontWeight: 'bold', fontSize: '14px' }}>{validationResult.summary?.warning || 0}</span>
                                            <div style={{ fontSize: '9px', color: '#8B919E' }}>WARNINGS</div>
                                        </div>
                                        <div style={{ backgroundColor: 'rgba(74,158,224,0.15)', border: '1px solid #4A9EE0', borderRadius: '4px', padding: '6px 12px', textAlign: 'center' }}>
                                            <span style={{ color: '#4A9EE0', fontWeight: 'bold', fontSize: '14px' }}>{validationResult.summary?.info || 0}</span>
                                            <div style={{ fontSize: '9px', color: '#8B919E' }}>INFO</div>
                                        </div>
                                    </div>

                                    {/* 4-cell Heatmap */}
                                    <div style={{ display: 'flex', border: '1px solid #3A3F4B', borderRadius: '4px', overflow: 'hidden' }}>
                                        {['critical', 'at_risk', 'watch', 'clean'].map(key => {
                                            const colors = { critical: '#E05252', at_risk: '#E09A3A', watch: '#F2C94C', clean: '#52C47A' };
                                            const labels = { critical: 'Crit', at_risk: 'Risk', watch: 'Watch', clean: 'Good' };
                                            const count = validationResult.face_health?.[key] !== undefined ? validationResult.face_health[key] : (validationResult.heatmap?.[key] || 0);
                                            return (
                                                <div key={key} style={{ padding: '6px 10px', textAlign: 'center', borderRight: '1px solid #3A3F4B', minWidth: '60px', borderTop: `3px solid ${colors[key]}` }}>
                                                    <div style={{ fontWeight: 'bold', fontSize: '13px' }}>{count}</div>
                                                    <div style={{ fontSize: '9px', color: '#8B919E' }}>{labels[key]}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Engineer review banner */}
                                {validationResult.engineer_review_required && (
                                    <div style={{ backgroundColor: 'rgba(224,154,58,0.1)', border: '1px solid #E09A3A', color: '#E09A3A', padding: '8px 12px', borderRadius: '4px', fontWeight: 'bold', display: 'flex', gap: '8px', alignItems: 'center' }}>
                                        <span>⚠</span>
                                        <span>Engineer review required before committing to tooling</span>
                                    </div>
                                )}

                                {/* GNN AI Analysis bar */}
                                <div style={s.card}>
                                    <h3 style={s.cardTitle}>GNN Inference & Neural Risk Matrix</h3>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px', fontWeight: '500' }}>
                                        <span>Manufacturing Risk Index</span>
                                        <span>{Math.round(validationResult.gnn_risk_score * 100)}%</span>
                                    </div>
                                    <div style={{ height: '8px', backgroundColor: '#2F3540', borderRadius: '4px', overflow: 'hidden', marginBottom: '8px' }}>
                                        <div style={{
                                            height: '100%',
                                            width: `${validationResult.gnn_risk_score * 100}%`,
                                            backgroundColor: validationResult.gnn_risk_score > 0.6 ? '#E05252' : (validationResult.gnn_risk_score > 0.3 ? '#E09A3A' : '#4A9EE0'),
                                            transition: 'width 0.8s ease'
                                        }}></div>
                                    </div>
                                    <span style={{ fontSize: '10.5px', color: '#8B919E' }}>
                                        Engine: {validationResult.ai_analysis?.mode || 'GAT GNN'} · Confidence: {validationResult.ai_analysis?.confidence || 95}%
                                    </span>
                                </div>

                                {/* Violations List panel */}
                                <div style={s.card}>
                                    <h3 style={s.cardTitle}>Active Violations ({validationResult.violations?.length || 0})</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                        {(validationResult.violations || []).map((v, idx) => {
                                            const isExpanded = expandedViolation === v.rule_id;
                                            const isFixExpanded = expandedFixPanel === v.rule_id;
                                            const faceId = v.face_id || (v.face_ids ? v.face_ids[0] : 'F1');

                                            // Extract delta values
                                            const mVal = parseFloat(v.measured_value) || 0;
                                            const rVal = parseFloat(v.required_value) || 0;
                                            const delta = Math.abs(rVal - mVal);

                                            return (
                                                <div
                                                    key={idx}
                                                    id={`viol-card-${v.rule_id}`}
                                                    style={{ border: '1px solid #3A3F4B', borderRadius: '4px', overflow: 'hidden', cursor: isInsideCAD ? 'pointer' : 'default' }}
                                                    onMouseEnter={() => { if (isInsideCAD) sendToCAD('highlight_faces', { face_ids: v.face_ids || [v.face_id || ''] }); }}
                                                    onMouseLeave={() => { if (isInsideCAD) sendToCAD('clear_view'); }}
                                                >
                                                    {/* Collapsed Header */}
                                                    <div
                                                        onClick={() => setExpandedViolation(isExpanded ? null : v.rule_id)}
                                                        style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', cursor: 'pointer', backgroundColor: '#2F3540' }}
                                                    >
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                            <div style={{ backgroundColor: getSeverityColor(v.severity), width: '6px', height: '14px', borderRadius: '2px' }}></div>
                                                            <span style={{ fontWeight: '600' }}>[{v.severity}] {v.rule_id || v.id}</span>
                                                            <span style={{ color: '#8B919E' }}>Face {faceId}</span>
                                                        </div>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                            <span style={{ fontSize: '11px', color: '#E05252', fontWeight: 'bold' }}>
                                                                {v.measured_value}{v.unit || 'mm'} → ≥{v.required_value}{v.unit || 'mm'} (+{delta.toFixed(2)}{v.unit || 'mm'} needed)
                                                            </span>
                                                            <span>{isExpanded ? '▲' : '▼'}</span>
                                                        </div>
                                                    </div>

                                                    {/* Expanded Body Panel */}
                                                    {isExpanded && (
                                                        <div style={{ padding: '14px', borderTop: '1px solid #3A3F4B', display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                                            {/* Dimension callout block */}
                                                            <div style={{ display: 'flex', gap: '20px', alignItems: 'center', justifyContent: 'space-between', backgroundColor: 'rgba(74,128,224,0.05)', padding: '10px', borderRadius: '4px', border: '1px solid rgba(74,128,224,0.15)' }}>
                                                                <div>
                                                                    <div style={{ fontSize: '11px', color: '#8B919E' }}>▲ DIMENSION CALLOUT</div>
                                                                    <div style={{ fontSize: '12.5px', marginTop: '4px' }}>
                                                                        Measured: <b>{v.measured_value} mm</b> | Required: <b>{v.required_value} mm</b> | Delta: <b style={{ color: '#E05252' }}>+{delta.toFixed(2)} mm</b>
                                                                    </div>
                                                                </div>
                                                                <button style={s.btn('secondary')} onClick={() => focusFaceRow(faceId)}>
                                                                    [← Go to face]
                                                                </button>
                                                            </div>

                                                            {/* Violation description text */}
                                                            <div style={{ fontSize: '12.5px', lineHeight: '1.4' }}>
                                                                <b>{v.rule_id || v.id}</b> · {v.source || 'Rules Engine'} · <span style={{ color: getSeverityColor(v.severity) }}>{v.severity}</span>
                                                                <p style={{ marginTop: '4px', color: '#E8EAF0' }}>{v.message || v.description}</p>
                                                            </div>

                                                            {/* How to Fix Dropdown */}
                                                            <button
                                                                style={{ ...s.btn('secondary'), justifyContent: 'flex-start', border: '1px solid #3A3F4B' }}
                                                                onClick={() => setExpandedFixPanel(isFixExpanded ? null : v.rule_id)}
                                                            >
                                                                🔧 How to Fix ↗
                                                            </button>
                                                            {isFixExpanded && (
                                                                <div style={{ backgroundColor: '#1E2227', border: '1px solid #3A3F4B', borderRadius: '4px', padding: '10px', fontSize: '11.5px', color: '#8B919E', lineHeight: '1.45' }}>
                                                                    <b>Corrective Action Recommendation:</b>
                                                                    <p style={{ marginTop: '4px', color: '#E8EAF0' }}>{v.fix_suggestion}</p>
                                                                    <p style={{ marginTop: '6px', fontSize: '10.5px' }}><i>Action path: Edit extrusion sketch/depth inside FeatureManager and rebuild.</i></p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Face Risk list breakdown */}
                                <div style={s.card}>
                                    <h3 style={s.cardTitle}>Face-Level Risk Breakdown</h3>
                                    <table style={s.table}>
                                        <thead>
                                            <tr>
                                                <th style={s.th}>Face ID</th>
                                                <th style={s.th}>Surface Type</th>
                                                <th style={s.th}>Thickness</th>
                                                <th style={s.th}>Radius</th>
                                                <th style={s.th}>Design Status</th>
                                                <th style={s.th}>Active Violations</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {faces.map((f, idx) => {
                                                // Check if face has violations
                                                const matchViol = (validationResult.violations || []).find(v => v.face_id === f.face_id || (v.face_ids && v.face_ids.includes(f.face_id)));

                                                let statusText = '🟢 PASS';
                                                let rowBg = 'transparent';
                                                let violText = '—';

                                                if (matchViol) {
                                                    violText = matchViol.rule_id;
                                                    if (matchViol.severity === 'CRITICAL') {
                                                        statusText = '🔴 CRITICAL';
                                                        rowBg = 'rgba(224, 82, 82, 0.1)';
                                                    } else {
                                                        statusText = '🟡 WARNING';
                                                        rowBg = 'rgba(224, 154, 58, 0.1)';
                                                    }
                                                }

                                                return (
                                                    <tr
                                                        key={idx}
                                                        onClick={() => selectFaceFromResultsTable(f.face_id)}
                                                        style={{ backgroundColor: rowBg, cursor: 'pointer', transition: 'background-color 0.2s' }}
                                                    >
                                                        <td style={{ ...s.td, fontWeight: 'bold' }}>{f.face_id}</td>
                                                        <td style={s.td}>{f.face_type_label}</td>
                                                        <td style={s.td}>{f.thickness_mm} mm</td>
                                                        <td style={s.td}>{f.radius_mm || '0.0'} mm</td>
                                                        <td style={{ ...s.td, fontWeight: 'bold' }}>{statusText}</td>
                                                        <td style={s.td}>{violText}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* --- TAB 3: REPORT --- */}
                        {activeTab === 'report' && validationResult && (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                                {/* Print toolbar */}
                                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '10px' }} className="no-print">
                                    <button style={s.btn('secondary')} onClick={copyReportToClipboard}>📋 Copy Report Text</button>
                                    <button style={s.btn('primary')} onClick={() => window.print()}>🖨 Print / Save PDF</button>
                                </div>

                                {/* Report paper */}
                                <div style={{ backgroundColor: '#fff', color: '#1A202C', padding: '40px', borderRadius: '6px', border: '1px solid #E2E8F0', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' }} className="print-container">
