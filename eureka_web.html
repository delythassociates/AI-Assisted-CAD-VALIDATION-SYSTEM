                                    <header style={{ borderBottom: '2px solid #2B6CB0', paddingBottom: '16px', marginBottom: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <div>
                                            <h1 style={{ fontSize: '22px', fontFamily: "'Outfit', sans-serif", color: '#2B6CB0', fontWeight: 'bold' }}>EUREKA DFM 3.0</h1>
                                            <span style={{ fontSize: '11px', color: '#718096' }}>Design for Manufacturability Validation Report</span>
                                        </div>
                                        <div style={{ textAlign: 'right', fontSize: '11px', color: '#718096' }}>
                                            <div><b>Part Name:</b> {partName}</div>
                                            <div><b>Date:</b> {new Date().toLocaleDateString()}</div>
                                        </div>
                                    </header>

                                    {/* Semicircle gauge dial replica */}
                                    <div style={{ display: 'flex', gap: '24px', alignItems: 'center', backgroundColor: '#F7FAFC', border: '1px solid #E2E8F0', borderRadius: '6px', padding: '16px', marginBottom: '20px' }}>
                                        <svg width="100" height="70" viewBox="0 0 100 80">
                                            <path d="M 10 70 A 40 40 0 0 1 90 70" fill="none" stroke="#E2E8F0" strokeWidth="10" strokeLinecap="round" />
                                            <path
                                                d="M 10 70 A 40 40 0 0 1 90 70"
                                                fill="none"
                                                stroke={validationResult.score >= 80 ? '#48BB78' : (validationResult.score >= 60 ? '#DD6B20' : '#E53E3E')}
                                                strokeWidth="10"
                                                strokeLinecap="round"
                                                strokeDasharray="125.6"
                                                strokeDashoffset={125.6 - (125.6 * (validationResult.score || 0)) / 100}
                                            />
                                            <text x="50" y="55" textAnchor="middle" fill="#2D3748" fontSize="18" fontWeight="bold">{validationResult.score}</text>
                                            <text x="50" y="72" textAnchor="middle" fill="#718096" fontSize="8" fontWeight="bold">SCORE</text>
                                        </svg>
                                        <div>
                                            <h3 style={{ fontSize: '16px', color: '#2B6CB0', fontWeight: 'bold' }}>Manufacturability Index: {validationResult.score}/100</h3>
                                            <p style={{ fontSize: '11.5px', color: '#4A5568', marginTop: '2px' }}>
                                                Process: <b>{process.toUpperCase()}</b> | Material: <b>{material}</b> | Wall target: <b>{nominalWall}mm</b>
                                            </p>
                                        </div>
                                    </div>

                                    {/* Report markdown layout */}
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px', fontSize: '13px', lineHeight: '1.5', color: '#2D3748' }}>
                                        <section>
                                            <h4 style={{ borderBottom: '1px solid #E2E8F0', paddingBottom: '4px', color: '#2B6CB0', fontSize: '13.5px', fontWeight: 'bold', marginBottom: '6px' }}>Executive Summary</h4>
                                            <p>A Design for Manufacturability (DFM) verification report was compiled for part <b>{partName}</b>. The design scored <b>{validationResult.score}/100</b>, placing it in the <b>{validationResult.score >= 80 ? 'EXCELLENT' : (validationResult.score >= 60 ? 'WARNING' : 'CRITICAL')}</b> risk category. A total of {validationResult.violations?.length || 0} active DFM constraint violations were identified by the automated rules engine and GNN inference model.</p>
                                        </section>

                                        {validationResult.violations?.length > 0 && (
                                            <section>
                                                <h4 style={{ borderBottom: '1px solid #E2E8F0', paddingBottom: '4px', color: '#2B6CB0', fontSize: '13.5px', fontWeight: 'bold', marginBottom: '6px' }}>Detailed DFM Findings</h4>
                                                <ol style={{ paddingLeft: '20px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                                    {validationResult.violations.map((v, i) => (
                                                        <li key={i}>
                                                            <b>{v.rule_id} (Face {v.face_id || v.face_ids?.[0]}):</b> {v.message || v.description}
                                                            <div style={{ color: '#4A5568', fontSize: '11.5px', marginTop: '2px' }}>
                                                                Measured: <b>{v.measured_value} mm</b> | Required: <b>{v.required_value} mm</b> | Corrective Suggestion: <i>{v.fix_suggestion}</i>
                                                            </div>
                                                        </li>
                                                    ))}
                                                </ol>
                                            </section>
                                        )}

                                        {/* Interactive checklist signoff */}
                                        <section className="no-print">
                                            <h4 style={{ borderBottom: '1px solid #E2E8F0', paddingBottom: '4px', color: '#2B6CB0', fontSize: '13.5px', fontWeight: 'bold', marginBottom: '6px' }}>Quality Sign-Off Checklist</h4>
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                                {interactiveChecklist.map(item => (
                                                    <label key={item.id} style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', fontSize: '12px' }}>
                                                        <input
                                                            type="checkbox"
                                                            checked={item.checked}
                                                            onChange={(e) => {
                                                                const list = interactiveChecklist.map(ch => ch.id === item.id ? { ...ch, checked: e.target.checked } : ch);
                                                                setInteractiveChecklist(list);
                                                            }}
                                                        />
                                                        <span style={{ textDecoration: item.checked ? 'line-through' : 'none', color: item.checked ? '#718096' : '#2D3748' }}>
                                                            {item.text}
                                                        </span>
                                                    </label>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- TAB 4: ABOUT --- */}
                        {activeTab === 'about' && (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
                                {/* Backend info */}
                                <div style={s.card}>
                                    <h3 style={s.cardTitle}>System Configurations</h3>
                                    <p><b>Product:</b> Eureka DFM 3.0 — Universal CAD Validator</p>
                                    <p><b>Model:</b> 12-D Graph Attention Network (GAT) trained on ABC dataset</p>
                                    <p><b>Rules loaded:</b> {rulesCount} registered DFM checks</p>
                                    <p><b>Available Processes:</b></p>
                                    <ul style={{ paddingLeft: '20px', marginTop: '6px' }}>
                                        {processes.map((p, idx) => (
                                            <li key={idx}><b>{p.name}</b>: {p.description} ({p.rule_count} rules)</li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Architecture Diagram (Inline SVG) */}
                                <div style={s.card}>
                                    <h3 style={s.cardTitle}>Architecture Flow Diagram</h3>
                                    <svg width="100%" height="120" viewBox="0 0 600 120">
                                        {/* Box 1 */}
                                        <rect x="10" y="30" width="120" height="50" rx="4" fill="#2F3540" stroke="#3A3F4B" strokeWidth="1" />
                                        <text x="70" y="60" textAnchor="middle" fill="#E8EAF0" fontSize="11" fontWeight="bold">Any CAD Tool</text>

                                        {/* Arrow 1 */}
                                        <line x1="130" y1="55" x2="180" y2="55" stroke="#4A80E0" strokeWidth="2" markerEnd="url(#arrow)" />

                                        {/* Box 2 */}
                                        <rect x="190" y="30" width="130" height="50" rx="4" fill="#2F3540" stroke="#3A3F4B" strokeWidth="1" />
                                        <text x="255" y="52" textAnchor="middle" fill="#E8EAF0" fontSize="11" fontWeight="bold">Eureka Web UI</text>
                                        <text x="255" y="68" textAnchor="middle" fill="#8B919E" fontSize="9">Manual Matrix Input</text>

                                        {/* Arrow 2 */}
                                        <line x1="320" y1="55" x2="370" y2="55" stroke="#4A80E0" strokeWidth="2" />

                                        {/* Box 3 */}
                                        <rect x="380" y="10" width="200" height="90" rx="4" fill="#2F3540" stroke="#3A3F4B" strokeWidth="1" />
                                        <text x="480" y="32" textAnchor="middle" fill="#E8EAF0" fontSize="11" fontWeight="bold">DFM API Backend</text>
                                        <text x="480" y="52" textAnchor="middle" fill="#E09A3A" fontSize="9.5">Rules Engine Validator</text>
                                        <text x="480" y="70" textAnchor="middle" fill="#4A9EE0" fontSize="9.5">12-D GAT GNN Inference</text>
                                        <text x="480" y="88" textAnchor="middle" fill="#52C47A" fontSize="9.5">Gemini AI Explanations</text>

                                        {/* Definitions for arrow marker */}
                                        <defs>
                                            <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A80E0" />
                                            </marker>
                                        </defs>
                                    </svg>
                                </div>

                                {/* CAD Grid compatibility */}
                                <div style={s.card}>
                                    <h3 style={s.cardTitle}>CAD Compatibility Grid</h3>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: '10px', textAlign: 'center' }}>
                                        {['SolidWorks ✓', 'CATIA ✓', 'Fusion 360 ✓', 'NX ✓', 'Onshape ✓', 'FreeCAD ✓'].map(tool => (
                                            <div key={tool} style={{ backgroundColor: '#2F3540', border: '1px solid #3A3F4B', padding: '10px', borderRadius: '4px', fontWeight: 'bold' }}>
                                                {tool}
                                            </div>
                                        ))}
                                    </div>
                                    <p style={{ marginTop: '12px', fontSize: '11.5px', color: '#8B919E', textAlign: 'center' }}>
                                        Works with any CAD software package capable of displaying face geometric properties in its inspector viewport.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- FULL SCREEN STEPPING OVERLAY --- */}
                    {showLoading && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            backgroundColor: 'rgba(20,22,25,0.85)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            zIndex: 10000
                        }}>
                            <div style={{ ...s.card, width: '320px', padding: '24px', textAlign: 'center' }}>
                                <h3 style={{ fontFamily: "'Outfit', sans-serif", fontSize: '15px', fontWeight: 'bold', marginBottom: '16px' }}>DFM Automated Analysis</h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', textAlign: 'left' }}>

                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span style={{ color: loadingStep >= 1 ? '#E8EAF0' : '#8B919E' }}>Step 1/4: Extracting face graph...</span>
                                        <span>{loadingStep > 1 ? '✓' : (loadingStep === 1 ? '⟳' : '○')}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span style={{ color: loadingStep >= 2 ? '#E8EAF0' : '#8B919E' }}>Step 2/4: Running rules engine...</span>
                                        <span>{loadingStep > 2 ? '✓' : (loadingStep === 2 ? '⟳' : '○')}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span style={{ color: loadingStep >= 3 ? '#E8EAF0' : '#8B919E' }}>Step 3/4: GAT GNN inference...</span>
                                        <span>{loadingStep > 3 ? '✓' : (loadingStep === 3 ? '⟳' : '○')}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span style={{ color: loadingStep >= 4 ? '#E8EAF0' : '#8B919E' }}>Step 4/4: Generating report...</span>
                                        <span>{loadingStep === 4 ? '⟳' : '○'}</span>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
